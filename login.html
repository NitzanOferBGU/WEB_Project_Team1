<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetProject - התחברות</title>
    <!-- ייבוא Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- ייבוא גופן -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- חיבור ל CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="container flex-grow-1 d-flex align-items-center mt-5 mb-5"> <!-- המלבן המרכזי בעמוד -->
        <div class="row justify-content-center w-100">
            <div class="col-lg-4 col-md-6 col-sm-10 col-12">
                
                <header class="text-center mb-4">
                    <img src="GetProjectLOGO.png" alt="GetProject LOGO" class="logo-img">
                    <h3 class="mt-2 fw-bold" style="color: var(--primary-color);">התחברות</h3>
                </header>

                <div class="card glass-card shadow-sm border-0">
                    <div class="card-body p-4">
                        <form id="loginForm" action="projects.html" method="get">  <!-- תחילת טופס התחברות -->
                            <div class="mb-3">
                                <label for="username" class="form-label fw-bold">שם משתמש</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold">סיסמה</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div class="d-grid">
                               <button type="submit" class="btn btn-action fs-5">כניסה</button>   
                            </div>
                        </form>
                        <div class="text-center mt-4">
                            <a href="signup.html" class="text-decoration-none fw-bold" style="color: var(--primary-color);">אין לך חשבון? הירשם כאן</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="clean-footer">  
        <small>© 2026 GetProject - איתי מזרחי, ניצן עופר ואיתי שרם</small>
    </footer>

</body>
</html>
